# ═══════════════════════════════════════════════════════════════════════════
# NOVAGUARDIAN - Configuración de Pytest
# ═══════════════════════════════════════════════════════════════════════════

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
addopts = -v --tb=short

[coverage:run]
source = app
omit = 
    app/tests/*
    app/__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
